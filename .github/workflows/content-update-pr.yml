name: Content Update PR

on:
  workflow_dispatch:
    inputs:
      payload_json:
        description: 'Paste JSON payload from /admin (keys: Bio, experiences, projects)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate payload and write content files
        uses: actions/github-script@v7
        env:
          PAYLOAD_JSON: ${{ inputs.payload_json }}
        with:
          script: |
            const fs = require("fs");

            const payloadRaw = process.env.PAYLOAD_JSON;
            let payload;

            try {
              payload = JSON.parse(payloadRaw);
            } catch (error) {
              core.setFailed(`Invalid JSON payload: ${error.message}`);
              return;
            }

            const requiredKeys = ["Bio", "experiences", "projects"];
            for (const key of requiredKeys) {
              if (!(key in payload)) {
                core.setFailed(`Missing key "${key}" in payload_json`);
                return;
              }
            }

            if (!Array.isArray(payload.experiences)) {
              core.setFailed('"experiences" must be an array');
              return;
            }

            if (!Array.isArray(payload.projects)) {
              core.setFailed('"projects" must be an array');
              return;
            }

            const writeJson = (path, value) => {
              fs.writeFileSync(path, `${JSON.stringify(value, null, 2)}\n`, "utf8");
              core.info(`Updated ${path}`);
            };

            writeJson("src/content/bio.json", payload.Bio);
            writeJson("src/content/experiences.json", { items: payload.experiences });
            writeJson("src/content/projects.json", { items: payload.projects });

            writeJson("public/content/bio.json", payload.Bio);
            writeJson("public/content/experiences.json", { items: payload.experiences });
            writeJson("public/content/projects.json", { items: payload.projects });

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update portfolio content from admin payload"
          branch: "content-update/${{ github.run_id }}"
          delete-branch: true
          title: "Update portfolio content from admin payload"
          body: |
            ## Summary
            - Applies `Bio`, `experiences`, and `projects` from the admin payload.
            - Updates both `src/content/*` and `public/content/*`.

            ## Trigger
            Manually triggered via GitHub Actions `workflow_dispatch`.
