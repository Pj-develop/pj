<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portfolio Admin</title>
    <style>
      :root {
        --bg: #0f1220;
        --card: #171b2e;
        --line: #2d3558;
        --text: #e9edff;
        --muted: #9ca9d6;
        --accent: #854ce6;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: linear-gradient(135deg, #0b0f1d, #161b33);
        color: var(--text);
        min-height: 100vh;
      }
      .container { max-width: 960px; margin: 40px auto; padding: 0 16px; }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      }
      h1 { margin: 0 0 8px; font-size: 28px; }
      p { color: var(--muted); margin: 0 0 18px; }
      label { display: block; margin: 12px 0 6px; font-weight: 600; }
      input, textarea {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: #0f1430;
        color: var(--text);
      }
      textarea { min-height: 260px; resize: vertical; font-family: ui-monospace, monospace; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
      button {
        border: none;
        border-radius: 10px;
        padding: 10px 14px;
        cursor: pointer;
        font-weight: 600;
      }
      .primary { background: var(--accent); color: #fff; }
      .ghost { background: transparent; color: var(--text); border: 1px solid var(--line); }
      .ok { color: #65d894; margin-top: 10px; font-size: 14px; }
      .err { color: #ff7f7f; margin-top: 10px; font-size: 14px; }
      .hidden { display: none; }
      @media (max-width: 780px) { .row { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="container">
      <section id="loginCard" class="card">
        <h1>Portfolio Admin</h1>
        <p>Simple frontend login for quick profile updates.</p>
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="Enter email" />
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Enter password" />
        <div class="actions">
          <button class="primary" id="loginBtn">Login</button>
        </div>
        <div id="loginMsg"></div>
      </section>

      <section id="editorCard" class="card hidden">
        <h1>Content Editor</h1>
        <p>Edit JSON and click save. Refresh the portfolio to see updates.</p>
        <div class="row">
          <div>
            <label for="bioJson">Bio</label>
            <textarea id="bioJson"></textarea>
          </div>
          <div>
            <label for="expJson">Experiences</label>
            <textarea id="expJson"></textarea>
          </div>
        </div>
        <label for="projJson">Projects</label>
        <textarea id="projJson"></textarea>

        <div class="actions">
          <button class="primary" id="saveBtn">Save Changes</button>
          <button class="ghost" id="resetBtn">Reset to Defaults</button>
          <button class="ghost" id="logoutBtn">Logout</button>
          <a class="ghost" style="text-decoration:none;padding:10px 14px;border-radius:10px;" href="/">Open Portfolio</a>
        </div>
        <div id="editorMsg"></div>
      </section>
    </div>

    <script>
      (function () {
        const CRED = {
          email: "priyanshu.k4444@gmail.com",
          password: "Priyan123$"
        };
        const STORAGE = "portfolio-content-overrides";
        const AUTH = "portfolio-admin-auth";

        const loginCard = document.getElementById("loginCard");
        const editorCard = document.getElementById("editorCard");
        const loginMsg = document.getElementById("loginMsg");
        const editorMsg = document.getElementById("editorMsg");

        const bioJson = document.getElementById("bioJson");
        const expJson = document.getElementById("expJson");
        const projJson = document.getElementById("projJson");

        let defaults = null;

        const setMsg = (el, msg, isError) => {
          el.className = isError ? "err" : "ok";
          el.textContent = msg;
        };

        const loadDefaults = async () => {
          const [bio, exp, proj] = await Promise.all([
            fetch("../content/bio.json").then((r) => r.json()),
            fetch("../content/experiences.json").then((r) => r.json()),
            fetch("../content/projects.json").then((r) => r.json())
          ]);
          defaults = { Bio: bio, experiences: exp.items, projects: proj.items };
        };

        const hydrateEditor = () => {
          const saved = JSON.parse(localStorage.getItem(STORAGE) || "{}");
          const state = {
            Bio: saved.Bio || defaults.Bio,
            experiences: saved.experiences || defaults.experiences,
            projects: saved.projects || defaults.projects
          };
          bioJson.value = JSON.stringify(state.Bio, null, 2);
          expJson.value = JSON.stringify(state.experiences, null, 2);
          projJson.value = JSON.stringify(state.projects, null, 2);
        };

        const showEditor = async () => {
          await loadDefaults();
          loginCard.classList.add("hidden");
          editorCard.classList.remove("hidden");
          hydrateEditor();
        };

        document.getElementById("loginBtn").addEventListener("click", async () => {
          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value;
          if (email === CRED.email && password === CRED.password) {
            localStorage.setItem(AUTH, "true");
            setMsg(loginMsg, "Login successful.", false);
            await showEditor();
          } else {
            setMsg(loginMsg, "Invalid credentials.", true);
          }
        });

        document.getElementById("saveBtn").addEventListener("click", () => {
          try {
            const payload = {
              Bio: JSON.parse(bioJson.value),
              experiences: JSON.parse(expJson.value),
              projects: JSON.parse(projJson.value)
            };
            localStorage.setItem(STORAGE, JSON.stringify(payload));
            setMsg(editorMsg, "Saved. Refresh portfolio page to apply updates.", false);
          } catch (error) {
            setMsg(editorMsg, "Invalid JSON. Please fix format and try again.", true);
          }
        });

        document.getElementById("resetBtn").addEventListener("click", () => {
          localStorage.removeItem(STORAGE);
          hydrateEditor();
          setMsg(editorMsg, "Reset done. Defaults restored.", false);
        });

        document.getElementById("logoutBtn").addEventListener("click", () => {
          localStorage.removeItem(AUTH);
          location.reload();
        });

        if (localStorage.getItem(AUTH) === "true") {
          showEditor();
        }
      })();
    </script>
  </body>
</html>
